runtime: python311
instance_class: F2

entrypoint: uvicorn backend.main:app --host 0.0.0.0 --port $PORT

env_variables:
  ENVIRONMENT: "production"
  # For local dev you use .env; in App Engine you can set OPENAI_API_KEY and
  # GOOGLE_PLACES_API_KEY here, via deploy_gcp.sh, or in the Cloud console.
  # OPENAI_API_KEY: "sk-xxxxx"
  # GOOGLE_PLACES_API_KEY: "AIza..."

automatic_scaling:
  min_instances: 0
  max_instances: 1
  target_cpu_utilization: 0.65

handlers:
  # Serve built React frontend (Vite) statically
  - url: /assets
    static_dir: frontend/dist/assets

  - url: /hellocity-logo.png
    static_files: frontend/dist/hellocity-logo.png
    upload: frontend/dist/hellocity-logo.png

  - url: /
    static_files: frontend/dist/index.html
    upload: frontend/dist/index.html

  # All other paths (API) go to FastAPI
  - url: /.*
    script: auto
    secure: always
